<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0f; color:#e0e0e0; font-family:-apple-system,system-ui,sans-serif; padding:60px; width:1270px; height:600px; display:flex; align-items:center; justify-content:center; }
.flow { display:flex; align-items:center; gap:24px; }
.step { background:#14141f; border:1px solid #2a2a3a; border-radius:16px; padding:32px 28px; text-align:center; width:200px; }
.step-icon { font-size:40px; margin-bottom:12px; }
.step-title { font-size:16px; font-weight:700; color:#fff; margin-bottom:6px; }
.step-desc { font-size:12px; color:#888; line-height:1.4; }
.arrow { font-size:32px; color:#c084fc; }
.step.highlight { border-color:#c084fc; box-shadow:0 0 30px #c084fc33; }
.step.highlight .step-title { color:#c084fc; }
.badge { display:inline-block; background:#c084fc22; color:#c084fc; padding:3px 10px; border-radius:12px; font-size:11px; font-weight:600; margin-top:8px; }
</style>
</head>
<body>
<div class="flow">
  <div class="step">
    <div class="step-icon">🤖</div>
    <div class="step-title">Your AI Agent</div>
    <div class="step-desc">Needs to ask the user a question</div>
    <div class="badge">Any LLM</div>
  </div>
  <div class="arrow">→</div>
  <div class="step highlight">
    <div class="step-icon">❓</div>
    <div class="step-title">BetterAsk API</div>
    <div class="step-desc">Returns archetype + prompt + example from 607 corpus</div>
    <div class="badge">$0 AI cost</div>
  </div>
  <div class="arrow">→</div>
  <div class="step">
    <div class="step-icon">🧠</div>
    <div class="step-title">Your LLM</div>
    <div class="step-desc">Generates the question using BetterAsk's prompt</div>
    <div class="badge">Your model</div>
  </div>
  <div class="arrow">→</div>
  <div class="step">
    <div class="step-icon">💬</div>
    <div class="step-title">Real Conversation</div>
    <div class="step-desc">User gets a question that makes them lean in</div>
    <div class="badge">10x signal</div>
  </div>
</div>
</body>
</html>
